<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>言語ループ 🔁</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">言語ループ <span>🔁</span></div>
    <div class="daybadge" id="dayBadge">Day 1</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="learn">今日の学習</button>
    <button class="tab" data-view="summary">まとめ</button>
    <button class="tab" data-view="settings">設定</button>
  </nav>

  <main id="app">
    <!-- ===== 学習ビュー ===== -->
    <section id="view-learn" class="view active">
      <!-- ステージ: ホーム -->
      <div id="stage-home" class="stage">
        <div class="progress-card">
          <div class="pc-row"><span>学習済みの単語</span><b id="learnedCount">0</b></div>
          <div class="pc-row"><span>今日の新規</span><b id="todayNew">20</b></div>
          <div class="bar"><div id="barFill" class="bar-fill"></div></div>
        </div>
        <div class="day-jump">
          <label for="daySelect">日を選ぶ</label>
          <select id="daySelect"></select>
        </div>
        <button class="big-btn" id="startWordsBtn">📝 単語パート（導入＋クイズ）</button>
        <button class="big-btn alt" id="startExamplesBtn">📖 例文パート</button>
        <button class="big-btn alt2" id="startExQuizBtn">🗣️ 例文クイズ（日本語→対象言語）</button>
        <button class="ghost-btn wide" id="homeNextDayBtn">次の日へ進む →</button>
        <p class="hint">単語と例文は別々に進められます。</p>
      </div>

      <!-- ステージ: 単語導入 -->
      <div id="stage-intro" class="stage hidden">
        <div class="step-label">① 新しい単語 <span id="introProg"></span></div>
        <div class="flashcard">
          <div class="fc-jp" id="introJp">—</div>
          <div class="fc-en" id="introEn">—</div>
          <div class="fc-roma" id="introRoma"></div>
          <div class="fc-note" id="introNote"></div>
          <button class="speak-btn" id="introSpeak">🔊 音声</button>
        </div>
        <div class="nav-row">
          <button class="ghost-btn" id="introPrev">← 戻る</button>
          <button class="big-btn" id="introNext">次へ →</button>
        </div>
      </div>

      <!-- ステージ: クイズ（フラッシュカード式・自己採点） -->
      <div id="stage-quiz" class="stage hidden">
        <div class="step-label">② 単語クイズ <span id="quizProg"></span></div>
        <div class="quiz-card">
          <div class="quiz-dir" id="quizDir"></div>
          <div class="quiz-q" id="quizPrompt">—</div>
          <div class="quiz-roma" id="quizPromptRoma"></div>
          <div class="quiz-answer hidden" id="quizAnswer"></div>
          <div class="quiz-roma" id="quizAnswerRoma"></div>
        </div>
        <div id="quizReveal"><button class="big-btn" id="revealBtn">答えを見る 👀</button></div>
        <div id="quizGrade" class="grade-row hidden">
          <button class="ghost-btn ng-btn" id="gradeNg">✕ まだ</button>
          <button class="big-btn ok-btn" id="gradeOk">◯ できた → 次へ</button>
        </div>
      </div>

      <!-- ステージ: 例文・シャドーイング -->
      <div id="stage-shadow" class="stage hidden">
        <div class="step-label">③ 例文シャドーイング <span id="shadowProg"></span></div>
        <div class="sentence-card">
          <div class="sc-expr" id="shadowExpr"></div>
          <div class="sc-en" id="shadowEn">—</div>
          <div class="sc-roma" id="shadowRoma"></div>
          <div class="sc-jp" id="shadowJp">—</div>
          <div class="shadow-controls">
            <button class="speak-btn" id="shadowPlay">🔊 再生</button>
            <button class="ghost-btn" id="shadowSlow">🐢 ゆっくり</button>
          </div>
          <p class="hint">音声のあとに続けて声に出そう（シャドーイング）</p>
        </div>
        <div class="nav-row">
          <button class="ghost-btn" id="shadowPrev">← 戻る</button>
          <button class="big-btn" id="shadowNext">次へ →</button>
        </div>
      </div>

      <!-- ステージ: 例文クイズ（日本語→対象言語） -->
      <div id="stage-exquiz" class="stage hidden">
        <div class="step-label">🗣️ 例文クイズ <span id="exqProg"></span></div>
        <div class="quiz-card">
          <div class="quiz-dir">日本語を見て、対象言語で言ってみよう</div>
          <div class="exq-jp" id="exqJp">—</div>
          <div class="sc-expr" id="exqExpr"></div>
          <div class="quiz-answer hidden" id="exqAnswer"></div>
          <div class="quiz-roma" id="exqRoma"></div>
        </div>
        <div id="exqReveal"><button class="big-btn" id="exqRevealBtn">答えをみる 👀</button></div>
        <div id="exqAfter" class="grade-row hidden">
          <button class="ghost-btn" id="exqPlay">🔊 再生</button>
          <button class="big-btn" id="exqNext">次へ →</button>
        </div>
      </div>

      <!-- ステージ: 単語パート完了 -->
      <div id="stage-worddone" class="stage hidden">
        <div class="done-emoji">✅</div>
        <h2>単語パート完了！</h2>
        <p class="hint" id="wordDoneMsg"></p>
        <button class="big-btn" id="toExamplesBtn">📖 例文パートへ進む</button>
        <button class="ghost-btn wide" id="wordHomeBtn">ホームに戻る</button>
      </div>

      <!-- ステージ: 完了 -->
      <div id="stage-done" class="stage hidden">
        <div class="done-emoji">🎉</div>
        <h2>例文パート完了！</h2>
        <p class="hint" id="doneMsg"></p>
        <button class="big-btn" id="repeatShadowBtn">📖 今日の例文をもう一度</button>
        <button class="ghost-btn wide" id="doneHomeBtn">ホームに戻る</button>
        <button class="ghost-btn wide" id="nextDayBtn">次の日へ進む →</button>
      </div>
    </section>

    <!-- ===== まとめビュー ===== -->
    <section id="view-summary" class="view">
      <div class="seg">
        <button class="seg-btn active" data-sum="vocab">語彙まとめ</button>
        <button class="seg-btn" data-sum="expr">表現まとめ</button>
      </div>
      <div id="summaryBody" class="summary-body"></div>
    </section>

    <!-- ===== 設定ビュー ===== -->
    <section id="view-settings" class="view">
      <div class="setting-row">
        <label>学習する言語</label>
        <select id="langSelect"></select>
      </div>
      <div class="setting-row">
        <label>1日の新規単語数</label>
        <select id="newCountSelect">
          <option>10</option><option>15</option><option selected>20</option><option>25</option><option>30</option>
        </select>
      </div>
      <div class="setting-row">
        <label>音声（声）</label>
        <select id="voiceSelect"></select>
        <div id="voiceInfo" class="voice-info"></div>
        <button class="ghost-btn tiny" id="reloadVoices" style="margin-top:8px">🔄 声の一覧を更新</button>
      </div>
      <div class="setting-row">
        <label>読み上げ速度: <span id="rateVal">1.0</span></label>
        <input type="range" id="rateRange" min="0.5" max="1.2" step="0.1" value="0.95">
      </div>
      <button class="speak-btn" id="testVoice">🔊 声のテスト</button>
      <hr>
      <button class="danger-btn" id="resetBtn">進捗をリセット</button>
    </section>
  </main>

  <script src="data.js?v=38"></script>
  <script src="data_i18n.js?v=38"></script>
  <script src="app.js?v=38"></script>
</body>
</html>
